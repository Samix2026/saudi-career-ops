# config/profile.example.yml
# نسخة المثال — انسخه إلى profile.yml وعدّل القيم بمعلوماتك الفعلية
# تحذير: لا تضع هنا رقم الهوية الوطنية أو الإقامة أو أي بيانات حساسة

# ───────────────────────────────────────────
# الهوية المهنية
# ───────────────────────────────────────────
name: "اسمك الكامل"
current_title: "المسمى الوظيفي الحالي"
nationality: "سعودي"               # سعودي | مقيم
iqama_status: "not_applicable"     # (للمقيمين) valid | transferable | tied | not_applicable
location: "الرياض"                  # Riyadh | Jeddah | Dammam | Remote | NEOM | ...

# ───────────────────────────────────────────
# ما تبحث عنه
# ───────────────────────────────────────────
target_title: "Head of Operations"
target_roles:
  - "Head of Operations"
  - "Operations Director"
target_sectors:
  - "fintech"
  - "banking"
target_cities:
  - "Riyadh"
target_org_types:
  - "pif_entity"
  - "rhq"
  - "private"
willing_to_relocate: false
remote_preference: "hybrid"        # onsite | hybrid | remote | any

# ───────────────────────────────────────────
# المستوى الوظيفي
# ───────────────────────────────────────────
seniority: "senior"                # entry | junior | mid | senior | lead | manager | director
years_experience: 8
current_sector: "fintech"

# ───────────────────────────────────────────
# الراتب
# ───────────────────────────────────────────
salary_floor_sar: 25000            # الحد الأدنى المقبول (ريال شهرياً)
salary_target_sar: 35000           # الهدف المعقول
include_allowances: true           # هل تحسب البدلات في المقارنة؟

# ───────────────────────────────────────────
# تفضيلات نوع المنشأة
# ───────────────────────────────────────────
preferred_org_types:
  - "pif_entity"
  - "rhq"
avoid_org_types: []

# ───────────────────────────────────────────
# سياق إضافي
# ───────────────────────────────────────────
currently_employed: true
open_to_tamheer: false             # للسعوديين فقط
notes: ""                          # أي سياق آخر يجب أن يعرفه الـ agent
