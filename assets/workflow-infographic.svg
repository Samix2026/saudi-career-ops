<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <rect width="1200" height="675" fill="#f8fafc"/>
  <rect x="60" y="60" width="1080" height="120" rx="18" fill="#0f766e"/>
  <text x="120" y="115" font-family="Arial, sans-serif" font-size="42" fill="#ffffff">Saudi Career Ops: Workflow Infographic</text>
  <g font-family="Arial, sans-serif" font-size="32" fill="#0f172a">
